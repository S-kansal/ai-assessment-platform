name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test Backend ────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from app.main import app; print('Backend imports OK')"

      - name: Run health check test
        run: |
          uvicorn app.main:app --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || exit 1
          kill %1

  # ── Build Frontend ─────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  # ── Docker Build ───────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-assessment-backend ./backend

      - name: Verify Docker image
        run: |
          docker run -d -p 8000:8000 --name test-backend ai-assessment-backend
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-backend

  # ── Deploy ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend
        run: |
          echo "Deploy to Render/Railway/Fly.io via their CLI or API"
          echo "Example: render deploy --service ai-assessment-backend"

      - name: Deploy frontend
        run: |
          echo "Frontend auto-deploys via Vercel on push to main"
