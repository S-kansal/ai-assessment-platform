services:
  - type: web
    name: ai-assessment-api
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ai-assessment.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false
    healthCheckPath: /health
    rootDir: backend
