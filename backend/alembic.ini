[alembic]
script_location = %(here)s/app/db/migrations
prepend_sys_path = .
# This value is overridden at runtime from the DATABASE_URL environment variable.
# Do not run migrations without DATABASE_URL set in your .env file.
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/ai_assessment

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
